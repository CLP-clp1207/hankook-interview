<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>韩泰轮胎 - 面试后台管理</title>
<style type="text/css">
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#f0f4f8; padding:16px; }
.header { text-align:center; margin-bottom:20px; }
.header h1 { color:#1a5276; font-size:20px; }
.refresh-info { font-size:11px; color:#95a5a6; margin-top:4px; }
.stats { display:flex; gap:12px; margin-bottom:20px; }
.stat-card { flex:1; background:white; border-radius:12px; padding:16px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.stat-card .num { font-size:28px; font-weight:700; }
.stat-card .label { font-size:12px; color:#7f8c8d; margin-top:4px; }
.stat-pass .num { color:#27ae60; }
.stat-fail .num { color:#e74c3c; }
.stat-total .num { color:#1a5276; }
.table-container { background:white; border-radius:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
table { width:100%; border-collapse:collapse; }
th { background:#1a5276; color:white; padding:10px 8px; font-size:12px; text-align:left; white-space:nowrap; }
td { padding:10px 8px; font-size:13px; border-bottom:1px solid #ecf0f1; }
tr:active { background:#e8f0fe; }
.pass { color:#27ae60; font-weight:600; }
.fail { color:#e74c3c; font-weight:600; }
.detail-panel { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; }
.detail-content { position:absolute; bottom:0; left:0; width:100%; max-height:80%; background:white; border-radius:16px 16px 0 0; padding:20px; overflow-y:auto; }
.detail-close { position:absolute; top:12px; right:16px; font-size:24px; cursor:pointer; color:#999; }
.detail-title { font-size:16px; font-weight:700; color:#1a5276; margin-bottom:12px; padding-right:30px; }
.detail-row { display:flex; margin-bottom:8px; font-size:13px; }
.detail-label { color:#7f8c8d; min-width:80px; }
.detail-value { color:#2c3e50; flex:1; word-break:break-all; }
.reason-box { background:#fdf2f2; border:1px solid #f5c6cb; border-radius:8px; padding:10px; margin-top:10px; font-size:13px; color:#e74c3c; }
.score-box { display:inline-block; padding:4px 12px; border-radius:6px; font-size:16px; font-weight:700; }
.score-pass { background:#e8f8f0; color:#27ae60; }
.score-fail { background:#fdf2f2; color:#e74c3c; }
</style>
</head>
<body>
<div class="header">
  <h1>&#127946; 韩泰轮胎 面试后台管理</h1>
  <div class="refresh-info">每30秒自动刷新</div>
</div>
<div class="stats">
  <div class="stat-card stat-total"><div class="num" id="numTotal">-</div><div class="label">总人数</div></div>
  <div class="stat-card stat-pass"><div class="num" id="numPass">-</div><div class="label">通过</div></div>
  <div class="stat-card stat-fail"><div class="num" id="numFail">-</div><div class="label">未通过</div></div>
</div>
<div class="table-container">
  <table>
    <thead><tr><th>#</th><th>姓名</th><th>年龄</th><th>性别</th><th>面试时间</th><th>评分</th><th>结果</th></tr></thead>
    <tbody id="tableBody"><tr><td colspan="7" style="text-align:center;padding:40px;color:#999;">正在加载数据...</td></tr></tbody>
  </table>
</div>
<div class="detail-panel" id="detailPanel" onclick="closeDetail(event)">
  <div class="detail-content" id="detailContent"></div>
</div>
<script type="text/javascript">//<![CDATA[
var CDN_BASE = "https://cdn.jsdelivr.net/gh/CLP-clp1207/hankook-interview@main/";
var allRecords = [];
var currentVersion = 0;
var initDone = false;

function xhr(url, ok, fail) {
  var x = new XMLHttpRequest();
  x.open("GET", url, true);
  x.timeout = 8000;
  x.ontimeout = function() { fail("超时"); };
  x.onerror = function() { fail("网络错误"); };
  x.onload = function() {
    if (x.status === 200) { ok(x.responseText); }
    else { fail("HTTP " + x.status); }
  };
  x.send();
}

function init() {
  xhr(CDN_BASE + "latest_backend.txt?t=" + Date.now(), function(txt) {
    var v = parseInt(txt.trim());
    if (v > 0) {
      currentVersion = v;
      loadVersion(v, function() {
        initDone = true;
        setInterval(probeNext, 30000);
      });
    } else {
      loadFallback();
    }
  }, function() {
    loadFallback();
  });
}

function loadVersion(v, ok) {
  xhr(CDN_BASE + "data_v" + v + ".json?t=" + Date.now(), function(txt) {
    try {
      var d = JSON.parse(txt);
      allRecords = d.records || [];
      renderAll(d);
      if (ok) ok();
    } catch(e) {
      if (v > 1) { loadVersion(v - 1, ok); }
      else { loadFallback(); }
    }
  }, function() {
    if (v > 1) { loadVersion(v - 1, ok); }
    else { loadFallback(); }
  });
}

function loadFallback() {
  xhr(CDN_BASE + "data.json?t=" + Date.now(), function(txt) {
    try {
      var d = JSON.parse(txt);
      allRecords = d.records || [];
      renderAll(d);
      initDone = true;
      setInterval(probeNext, 30000);
    } catch(e) {
      document.getElementById("tableBody").innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#e74c3c;">数据加载失败</td></tr>';
    }
  }, function() {
    document.getElementById("tableBody").innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#e74c3c;">网络错误，请稍后重试</td></tr>';
  });
}

function probeNext() {
  if (!initDone) return;
  var next = currentVersion + 1;
  xhr(CDN_BASE + "data_v" + next + ".json?t=" + Date.now(), function(txt) {
    try {
      var d = JSON.parse(txt);
      allRecords = d.records || [];
      renderAll(d);
      currentVersion = next;
    } catch(e) {}
  }, function() {});
}

function formatTime(ts) {
  if (!ts) return '';
  try {
    var d = new Date(ts);
    return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
  } catch(e) { return ts; }
}

function getLabel(questionText) {
  if (!questionText) return 'Q';
  var q = questionText;
  if (q.indexOf('姓名') >= 0) return '姓名';
  if (q.indexOf('年龄') >= 0) return '年龄';
  if (q.indexOf('性别') >= 0) return '性别';
  if (q.indexOf('联系方式') >= 0 || q.indexOf('手机') >= 0) return '联系方式';
  if (q.indexOf('学历') >= 0) return '学历';
  if (q.indexOf('身高') >= 0 || q.indexOf('体重') >= 0) return '身高体重';
  if (q.indexOf('户籍') >= 0 || q.indexOf('省份') >= 0) return '户籍';
  if (q.indexOf('工厂') >= 0 || q.indexOf('经验') >= 0) return '工厂经验';
  if (q.indexOf('加班') >= 0 || q.indexOf('夜班') >= 0) return '加班夜班';
  if (q.indexOf('纹身') >= 0) return '纹身';
  if (q.indexOf('到岗') >= 0) return '到岗时间';
  if (q.indexOf('居住') >= 0) return '居住地';
  if (q.indexOf('健康') >= 0 || q.indexOf('疾病') >= 0) return '健康状况';
  if (q.indexOf('叉车') >= 0) return '叉车证';
  return questionText.substring(0, 10);
}

function renderAll(d) {
  document.getElementById("numTotal").textContent = d.total;
  document.getElementById("numPass").textContent = d.passed;
  document.getElementById("numFail").textContent = d.failed;

  var tbody = document.getElementById("tableBody");
  if (!allRecords || allRecords.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#999;">暂无数据</td></tr>';
    return;
  }
  var html = "";
  for (var i = 0; i < allRecords.length; i++) {
    var r = allRecords[i];
    var cls = r.passed ? "pass" : "fail";
    var badge = r.passed ? "&#10004; 通过" : "&#10006; 未通过";
    html += '<tr onclick="showDetail(' + i + ')">' +
      '<td>' + (i+1) + '</td>' +
      '<td>' + esc(r.name || "") + '</td>' +
      '<td>' + esc(r.age || "") + '</td>' +
      '<td>' + esc(r.gender || "") + '</td>' +
      '<td style="font-size:11px;color:#95a5a6;">' + formatTime(r.timestamp) + '</td>' +
      '<td><strong>' + r.score + '</strong></td>' +
      '<td class="' + cls + '">' + badge + '</td></tr>';
  }
  tbody.innerHTML = html;
}

function showDetail(i) {
  var r = allRecords[i];
  var html = '<div class="detail-close" onclick="closeDetailBtn()">&#10005;</div>';
  html += '<div class="detail-title">详情 - ' + esc(r.name || "") + '</div>';

  if (r.answers) {
    var keys = Object.keys(r.answers).sort();
    for (var j = 0; j < keys.length; j++) {
      var a = r.answers[keys[j]];
      var label = getLabel(a.question);
      html += '<div class="detail-row"><div class="detail-label">' + esc(label) + '</div><div class="detail-value">' + esc(a.answer || "") + '</div></div>';
    }
  }

  var scoreClass = r.passed ? "score-pass" : "score-fail";
  html += '<div style="margin-top:12px;"><div class="score-box ' + scoreClass + '">' + r.score + '分</div></div>';

  if (r.reasons && r.reasons.length > 0) {
    html += '<div class="reason-box">' + esc(r.reasons.join("；")) + '</div>';
  }

  html += '<div style="margin-top:8px;font-size:12px;color:#bbb;">提交时间：' + formatTime(r.timestamp) + '</div>';

  document.getElementById("detailContent").innerHTML = html;
  document.getElementById("detailPanel").style.display = "block";
}

function closeDetail(event) {
  if (event.target === document.getElementById("detailPanel")) {
    document.getElementById("detailPanel").style.display = "none";
  }
}

function closeDetailBtn() {
  document.getElementById("detailPanel").style.display = "none";
}

function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

init();
//]]></script>
</body>
</html>
