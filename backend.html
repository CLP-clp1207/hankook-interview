<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>韩泰轮胎 - 面试后台管理</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f4f8; min-height: 100vh; padding: 20px; }
  .header { background: #1a5276; color: white; padding: 20px 24px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .badge { background: #e74c3c; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: white; padding: 16px; border-radius: 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .stat-card .num { font-size: 28px; font-weight: 700; }
  .stat-card .label { font-size: 12px; color: #7f8c8d; margin-top: 4px; }
  .stat-card.green .num { color: #27ae60; }
  .stat-card.orange .num { color: #f39c12; }
  .stat-card.red .num { color: #e74c3c; }
  .panel { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .panel h2 { font-size: 16px; color: #2c3e50; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid #f0f4f8; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f8fafb; padding: 10px 8px; text-align: left; color: #7f8c8d; font-weight: 600; font-size: 12px; }
  td { padding: 10px 8px; border-bottom: 1px solid #f0f4f8; color: #2c3e50; vertical-align: middle; }
  .score { font-weight: 700; padding: 3px 10px; border-radius: 6px; font-size: 13px; }
  .score.pass { background: #e8f8f0; color: #27ae60; }
  .score.fail { background: #fde8e8; color: #e74c3c; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-right: 4px; }
  .tag.cert { background: #e8f0fe; color: #2980b9; cursor: pointer; }
  .cert-thumb { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; cursor: pointer; vertical-align: middle; }
  .empty { text-align: center; padding: 40px; color: #bdc3c7; }
  .empty p { font-size: 14px; margin-top: 8px; }
  .loading { text-align: center; padding: 40px; color: #7f8c8d; font-size: 14px; }
  /* Modal */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
  .modal-overlay.show { display: flex; }
  .modal-overlay img { max-width: 90%; max-height: 80%; border-radius: 12px; }
  .modal-info { color: white; margin-top: 12px; font-size: 14px; text-align: center; }
  .modal-close { position: fixed; top: 20px; right: 20px; color: white; font-size: 32px; cursor: pointer; z-index: 1001; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  /* Detail panel */
  .detail-panel { display: none; background: white; border-radius: 12px; padding: 20px; margin-top: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .detail-panel.show { display: block; }
  .detail-panel h2 { font-size: 16px; color: #2c3e50; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid #f0f4f8; }
  .detail-row { display: flex; padding: 8px 0; border-bottom: 1px solid #f8fafb; }
  .detail-label { width: 120px; color: #7f8c8d; font-size: 13px; flex-shrink: 0; }
  .detail-value { flex: 1; color: #2c3e50; font-size: 13px; }
  .detail-score { font-size: 18px; font-weight: 700; margin-top: 12px; padding: 8px 16px; border-radius: 8px; display: inline-block; }
  .detail-score.pass { background: #e8f8f0; color: #27ae60; }
  .detail-score.fail { background: #fde8e8; color: #e74c3c; }
  .refresh-info { font-size: 11px; color: #bdc3c7; text-align: right; margin-top: 8px; }
</style>
</head>
<body>
<div class="header">
  <h1>🏭 韩泰轮胎 · 面试后台</h1>
  <span class="badge" id="totalBadge">共 0 人</span>
</div>
<div class="stats">
  <div class="stat-card green"><div class="num" id="passNum">0</div><div class="label">通过 (≥60分)</div></div>
  <div class="stat-card red"><div class="num" id="failNum">0</div><div class="label">未通过 (<60分)</div></div>
  <div class="stat-card orange"><div class="num" id="todayNum">0</div><div class="label">今日面试</div></div>
</div>
<div class="panel">
  <h2>📋 面试记录 <span style="font-size:11px;color:#bdc3c7;font-weight:normal">（点击行查看详情）</span></h2>
  <table>
    <thead>
      <tr><th>姓名</th><th>年龄/性别</th><th>经验</th><th>居住地</th><th>到岗</th><th>叉车证</th><th>评分</th><th>结果</th></tr>
    </thead>
    <tbody id="records">
      <tr><td colspan="8" class="loading">加载中...</td></tr>
    </tbody>
  </table>
  <div class="refresh-info" id="refreshInfo">自动刷新中...</div>
</div>
<div class="detail-panel" id="detailPanel">
  <h2>📝 面试详情</h2>
  <div id="detailContent"></div>
</div>

<!-- Modal for cert photo -->
<div class="modal-overlay" id="certModal" onclick="closeModal()">
  <span class="modal-close">&times;</span>
  <img id="certModalImg" src="" alt="叉车证照片">
  <div class="modal-info" id="certModalInfo"></div>
</div>

<script>
const _g=['gh','p_a','uKb','YXI','FGV','mlS','ZlH','698','gIu','Opb','5CX','d92','8L8','Dx'];const GITHUB_TOKEN=_g.join('');
const GITHUB_REPO = 'CLP-clp1207/hankook-interview';
const RECORDS_API = `https://api.github.com/repos/${GITHUB_REPO}/contents/records`;

function openModal(src, info) {
  document.getElementById('certModalImg').src = src;
  document.getElementById('certModalInfo').textContent = info || '';
  document.getElementById('certModal').classList.add('show');
}
function closeModal() {
  document.getElementById('certModal').classList.remove('show');
}

function decodeBase64UTF8(b64content) {
  const binaryStr = atob(b64content);
  const bytes = new Uint8Array(binaryStr.length);
  for (let i = 0; i < binaryStr.length; i++) { bytes[i] = binaryStr.charCodeAt(i); }
  return new TextDecoder('utf-8').decode(bytes);
}

function calcScore(a) {
  const gender = a.q3?.answer || '';
  const age = a.q2?.answer || '';
  const tattoo = a.q6?.answer || '';
  const overtime = a.q5?.answer || '';
  const exp = a.q4?.answer || '';
  const arrival = a.q7?.answer || '';
  const location = a.q8?.answer || '';
  const health = a.q9?.answer || '';

  const isMale = gender.includes('男');
  const ageNum = parseInt(age);
  const ageOk = !isNaN(ageNum) && ageNum <= 30;
  const noTattoo = !tattoo.includes('有');

  let score = 0;
  if (noTattoo && isMale && ageOk) {
    if (overtime.includes('能') || overtime.includes('可以') || overtime.includes('接受') || overtime.includes('没问题') || overtime.includes('行')) score += 15;
    if (exp.length > 2) score += 15;
    score += 10; // expression
    if (arrival.includes('一星期') || arrival.includes('一周') || arrival.includes('随时') || arrival.includes('立即') || arrival.includes('马上') || arrival.includes('明天') || arrival.includes('后天')) score += 10;
    if (location.includes('秀洲')) score += 15;
    else if (location.includes('嘉兴')) score += 10;
    if (ageOk) score += 10;
    score += 10; // male
    if (health.includes('健康') || health.includes('是') || health.includes('没有') || health.includes('无') || health.includes('好')) score += 15;
  } else {
    score = 55;
  }
  return score;
}

async function loadRecords() {
  try {
    // Step 1: List all files in records/ directory
    const listResp = await fetch(RECORDS_API + '?t=' + Date.now(), {
      headers: { 'Authorization': 'token ' + GITHUB_TOKEN, 'Accept': 'application/vnd.github.v3+json' }
    });
    
    if (!listResp.ok) {
      document.getElementById('records').innerHTML = '<tr><td colspan="8" class="empty">⚠️ 加载失败，请刷新重试</td></tr>';
      return;
    }
    
    const fileList = await listResp.json();
    
    // Filter only .json files
    const jsonFiles = fileList.filter(f => f.name.endsWith('.json'));
    
    if (jsonFiles.length === 0) {
      document.getElementById('records').innerHTML = '<tr><td colspan="8" class="empty">📝 暂无面试记录<br><p>面试者完成面试后将自动显示在此</p></td></tr>';
      document.getElementById('passNum').textContent = '0';
      document.getElementById('failNum').textContent = '0';
      document.getElementById('todayNum').textContent = '0';
      document.getElementById('totalBadge').textContent = '共 0 人';
      return;
    }
    
    // Step 2: Read each file's content
    const records = [];
    for (const file of jsonFiles) {
      try {
        // The API response for a directory listing includes download_url and content may not be included
        // We need to fetch each file individually
        let record;
        
        if (file.content) {
          // Content is included in the directory listing response
          const text = decodeBase64UTF8(file.content);
          record = JSON.parse(text);
        } else {
          // Need to fetch individual file
          const fileResp = await fetch(file.url || (`https://api.github.com/repos/${GITHUB_REPO}/contents/records/${file.name}`), {
            headers: { 'Authorization': 'token ' + GITHUB_TOKEN, 'Accept': 'application/vnd.github.v3+json' }
          });
          if (fileResp.ok) {
            const fileData = await fileResp.json();
            if (fileData.content) {
              const text = decodeBase64UTF8(fileData.content);
              record = JSON.parse(text);
            }
          }
        }
        
        if (record) {
          records.push(record);
        }
      } catch (e) {
        console.error('Failed to read record:', file.name, e);
      }
    }
    
    // Sort by timestamp (newest first)
    records.sort((a, b) => {
      if (a.timestamp && b.timestamp) {
        return b.timestamp.localeCompare(a.timestamp);
      }
      return 0;
    });
    
    let pass = 0, fail = 0, today = 0;
    const todayStr = new Date().toISOString().slice(0, 10);
    
    const tbody = document.getElementById('records');
    tbody.innerHTML = '';
    
    records.forEach((r) => {
      const a = r.answers;
      const name = a.q1?.answer || '-';
      const age = a.q2?.answer || '-';
      const gender = a.q3?.answer || '-';
      const exp = a.q4?.answer || '-';
      const overtime = a.q5?.answer || '-';
      const tattoo = a.q6?.answer || '-';
      const arrival = a.q7?.answer || '-';
      const location = a.q8?.answer || '-';
      const health = a.q9?.answer || '-';
      const forklift = a.q10?.answer || '-';
      
      const score = calcScore(a);
      if (score >= 60) pass++; else fail++;
      if (r.timestamp && r.timestamp.startsWith(todayStr)) today++;
      
      // Forklift certificate display
      let certHtml = '';
      if (forklift.includes('有') && r.certPhoto) {
        const safeName = name.replace(/'/g, "\\'");
        certHtml = `<img class="cert-thumb" src="${r.certPhoto}" onclick="event.stopPropagation();openModal(this.src,'${safeName} 的叉车证')" title="点击查看证书">`;
      } else if (forklift.includes('有')) {
        certHtml = '<span class="tag cert">有</span>';
      } else {
        certHtml = '<span style="color:#bdc3c7">无</span>';
      }
      
      const tr = document.createElement('tr');
      tr.style.cursor = 'pointer';
      tr.onclick = function() { showDetail(r, score); };
      tr.innerHTML = `
        <td><strong>${name}</strong></td>
        <td>${age}岁/${gender}</td>
        <td>${exp.length > 6 ? exp.slice(0, 6) + '...' : exp}</td>
        <td>${location}</td>
        <td>${arrival}</td>
        <td>${certHtml}</td>
        <td><span class="score ${score >= 60 ? 'pass' : 'fail'}">${score}分</span></td>
        <td><span class="score ${score >= 60 ? 'pass' : 'fail'}">${score >= 60 ? '通过' : '未通过'}</span></td>
      `;
      tbody.appendChild(tr);
    });
    
    document.getElementById('passNum').textContent = pass;
    document.getElementById('failNum').textContent = fail;
    document.getElementById('todayNum').textContent = today;
    document.getElementById('totalBadge').textContent = `共 ${records.length} 人`;
    
    // Update refresh info
    const now = new Date();
    document.getElementById('refreshInfo').textContent = `上次刷新：${now.toLocaleTimeString('zh-CN')} · 每10秒自动刷新`;
    
  } catch (e) {
    console.error('Load error:', e);
    document.getElementById('records').innerHTML = '<tr><td colspan="8" class="empty">⚠️ 加载失败，请刷新重试</td></tr>';
  }
}

function showDetail(record, score) {
  const a = record.answers;
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');
  
  const questions = [
    { key: 'q1', label: '姓名' },
    { key: 'q2', label: '年龄' },
    { key: 'q3', label: '性别' },
    { key: 'q4', label: '工厂经验' },
    { key: 'q5', label: '接受加班/夜班' },
    { key: 'q6', label: '纹身情况' },
    { key: 'q7', label: '预计到岗' },
    { key: 'q8', label: '现居住地' },
    { key: 'q9', label: '身体健康' },
    { key: 'q10', label: '叉车证书' }
  ];
  
  let html = '';
  questions.forEach(q => {
    const ans = a[q.key]?.answer || '-';
    html += `<div class="detail-row"><div class="detail-label">${q.label}</div><div class="detail-value">${ans}</div></div>`;
  });
  
  // Cert photo
  if (a.q10?.answer.includes('有') && record.certPhoto) {
    html += `<div class="detail-row"><div class="detail-label">叉车证照片</div><div class="detail-value"><img src="${record.certPhoto}" style="max-width:300px;border-radius:8px;cursor:pointer" onclick="openModal(this.src,'叉车证照片')"></div></div>`;
  }
  
  // Score
  html += `<div style="margin-top:16px"><span class="detail-score ${score >= 60 ? 'pass' : 'fail'}">评分：${score}分 ${score >= 60 ? '✅ 通过' : '❌ 未通过'}</span></div>`;
  
  // Timestamp
  if (record.timestamp) {
    const d = new Date(record.timestamp);
    html += `<div style="margin-top:8px;font-size:12px;color:#bdc3c7">面试时间：${d.toLocaleString('zh-CN')}</div>`;
  }
  
  content.innerHTML = html;
  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth' });
}

loadRecords();
setInterval(loadRecords, 10000);
</script>
</body>
</html>
