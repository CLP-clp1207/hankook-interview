function formatTime(ts){
  if(!ts)return '';
  try{var d=new Date(ts);return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');}catch(e){return ts;}
}
function getLabel(questionText){
  if(!questionText)return 'Q';
  var q=questionText;
  if(q.indexOf('姓名')>=0)return '姓名';
  if(q.indexOf('年龄')>=0)return '年龄';
  if(q.indexOf('性别')>=0)return '性别';
  if(q.indexOf('联系方式')>=0||q.indexOf('手机')>=0)return '联系方式';
  if(q.indexOf('学历')>=0)return '学历';
  if(q.indexOf('身高')>=0||q.indexOf('体重')>=0)return '身高体重';
  if(q.indexOf('户籍')>=0||q.indexOf('省份')>=0)return '户籍';
  if(q.indexOf('工厂')>=0||q.indexOf('经验')>=0)return '工厂经验';
  if(q.indexOf('加班')>=0||q.indexOf('夜班')>=0)return '加班夜班';
  if(q.indexOf('纹身')>=0)return '纹身';
  if(q.indexOf('到岗')>=0)return '到岗时间';
  if(q.indexOf('居住')>=0)return '居住地';
  if(q.indexOf('健康')>=0||q.indexOf('疾病')>=0)return '健康状况';
  if(q.indexOf('叉车')>=0)return '叉车证';
  return questionText.substring(0,10);
}
function renderTable(){
  var tbody=document.getElementById('tableBody');
  tbody.innerHTML='';
  RECORDS.forEach(function(r,i){
    var tr=document.createElement('tr');
    tr.onclick=function(){showDetail(i);};
    var cells=[
      i+1,
      r.name||'未知',
      r.age||'-',
      r.gender||'-',
      formatTime(r.timestamp),
      '<span class="'+(r.passed?'pass':'fail')+'">'+r.score+'分</span>',
      r.passed?'<span class="pass">通过</span>':'<span class="fail">未通过</span>'
    ];
    cells.forEach(function(c){
      var td=document.createElement('td');
      td.innerHTML=c;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}
function showDetail(idx){
  var r=RECORDS[idx];
  var panel=document.getElementById('detailPanel');
  var content=document.getElementById('detailContent');
  var html='<div class="detail-close" onclick="closeDetailForce()">&#215;</div>';
  html+='<div class="detail-title">'+(r.name||'未知')+' 的面试详情</div>';
  html+='<div class="detail-row"><div class="detail-label">评分</div><div class="detail-value"><span class="score-box '+(r.passed?'score-pass':'score-fail')+'">'+r.score+'分</span></div></div>';
  html+='<div class="detail-row"><div class="detail-label">结果</div><div class="detail-value">'+(r.passed?'通过':'未通过')+'</div></div>';
  if(!r.passed&&r.reasons&&r.reasons.length>0){
    html+='<div class="reason-box">未通过原因：'+r.reasons.join('、')+'</div>';
  }
  html+='<div style="margin-top:16px;border-top:1px solid #ecf0f1;padding-top:12px;"></div>';
  var ans=r.answers||{};
  var stdLabels=['姓名','年龄','性别','联系方式','学历','身高体重','户籍','工厂经验','加班夜班','纹身','到岗时间','居住地','健康状况','叉车证'];
  var used={};
  stdLabels.forEach(function(label){
    for(var key in ans){
      if(used[key])continue;
      var a=ans[key];
      if(a&&a.question){
        var matchedLabel=getLabel(a.question);
        if(matchedLabel===label){
          html+='<div class="detail-row"><div class="detail-label">'+label+'</div><div class="detail-value">'+(a.answer||'')+'</div></div>';
          used[key]=true;
          break;
        }
      }
    }
  });
  html+='<div style="height:40px;"></div>';
  content.innerHTML=html;
  panel.style.display='block';
}
function closeDetail(e){
  if(e.target===document.getElementById('detailPanel')){
    document.getElementById('detailPanel').style.display='none';
  }
}
function closeDetailForce(){
  document.getElementById('detailPanel').style.display='none';
}
