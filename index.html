<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>韩泰轮胎 - 普工招聘面试</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { background: white; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); padding: 40px 32px; max-width: 420px; width: 90%; }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo h1 { color: #1a5276; font-size: 22px; font-weight: 700; }
  .logo p { color: #7f8c8d; font-size: 14px; margin-top: 6px; }
  .chat-box { min-height: 300px; max-height: 420px; overflow-y: auto; padding: 16px; background: #f8fafb; border-radius: 12px; margin-bottom: 20px; }
  .msg-bot { background: #e8f0fe; color: #2c3e50; padding: 10px 14px; border-radius: 12px 12px 12px 4px; margin-bottom: 10px; max-width: 85%; font-size: 14px; line-height: 1.6; }
  .msg-user { background: #1a5276; color: white; padding: 10px 14px; border-radius: 12px 12px 4px 12px; margin-bottom: 10px; max-width: 85%; margin-left: auto; font-size: 14px; line-height: 1.6; }
  .input-area { display: flex; gap: 10px; }
  .input-area input { flex: 1; padding: 12px 16px; border: 2px solid #e0e6ed; border-radius: 10px; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .input-area input:focus { border-color: #1a5276; }
  .input-area button { padding: 12px 20px; background: #1a5276; color: white; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .input-area button:hover { background: #154360; }
  .input-area:disabled { opacity: 0.5; }
  .progress { text-align: center; margin-bottom: 16px; font-size: 12px; color: #95a5a6; }
  .progress-bar { height: 4px; background: #e0e6ed; border-radius: 2px; margin-top: 6px; }
  .progress-fill { height: 100%; background: #1a5276; border-radius: 2px; transition: width 0.3s; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>🏭 韩泰轮胎</h1>
    <p>普工岗位 · 在线面试</p>
  </div>
  <div class="progress" id="progress">问题 1 / 9</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:11%"></div></div>
  <div class="chat-box" id="chatBox"></div>
  <div class="input-area" id="inputArea">
    <input type="text" id="answerInput" placeholder="请输入您的回答..." autocomplete="off">
    <button onclick="submitAnswer()">发送</button>
  </div>
</div>
<script>
const questions = [
  "您好！欢迎参加韩泰轮胎普工岗位面试，我是AI招聘助理，接下来会问您几个问题。\n\n请问您的姓名是？",
  "请问您的年龄是？",
  "请问您的性别是？",
  "您有什么工厂工作经验？如果有，请描述一下？",
  "您能接受加班和夜班吗？我们的工作需要三班三倒。",
  "请问身上有纹身吗？",
  "请问您预计什么时候能到岗？",
  "请问您现在的居住地是？",
  "请问身体是否健康，无重大疾病？"
];

let current = 0;
let answers = [];

function addMsg(text, isBot) {
  const div = document.createElement('div');
  div.className = isBot ? 'msg-bot' : 'msg-user';
  div.innerText = text;
  document.getElementById('chatBox').appendChild(div);
  document.getElementById('chatBox').scrollTop = 99999;
}

function updateProgress() {
  document.getElementById('progress').innerText = `问题 ${current + 1} / 9`;
  document.getElementById('progressFill').style.width = ((current + 1) / 9 * 100) + '%';
}

function askNext() {
  if (current < 9) {
    updateProgress();
    setTimeout(() => addMsg(questions[current], true), 400);
  } else {
    finishInterview();
  }
}

function finishInterview() {
  document.getElementById('inputArea').style.display = 'none';
  document.getElementById('progress').innerText = '面试完成';
  document.getElementById('progressFill').style.width = '100%';
  addMsg("感谢您参加本次面试！如果通过，会有后续负责人与您联系。祝您好运！😊", true);
  // Save results
  const result = { timestamp: new Date().toISOString(), answers: {} };
  questions.forEach((q, i) => { result.answers[`q${i+1}`] = { question: q, answer: answers[i] }; });
  localStorage.setItem('hankook_interview_' + Date.now(), JSON.stringify(result));
}

function submitAnswer() {
  const input = document.getElementById('answerInput');
  const val = input.value.trim();
  if (!val) return;
  addMsg(val, false);
  answers.push(val);
  input.value = '';
  current++;
  askNext();
}

document.getElementById('answerInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitAnswer();
});

// Start
askNext();
</script>
</body>
</html>
