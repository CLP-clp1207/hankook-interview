<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>韩泰轮胎 - 普工招聘面试</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { background: white; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); padding: 40px 32px; max-width: 420px; width: 90%; }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo h1 { color: #1a5276; font-size: 22px; font-weight: 700; }
  .logo p { color: #7f8c8d; font-size: 14px; margin-top: 6px; }
  .chat-box { min-height: 300px; max-height: 420px; overflow-y: auto; padding: 16px; background: #f8fafb; border-radius: 12px; margin-bottom: 20px; }
  .msg-bot { background: #e8f0fe; color: #2c3e50; padding: 10px 14px; border-radius: 12px 12px 12px 4px; margin-bottom: 10px; max-width: 85%; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .msg-user { background: #1a5276; color: white; padding: 10px 14px; border-radius: 12px 12px 4px 12px; margin-bottom: 10px; max-width: 85%; margin-left: auto; font-size: 14px; line-height: 1.6; }
  .msg-photo { background: #d5e8d4; color: #2c3e50; padding: 8px 12px; border-radius: 12px 12px 4px 12px; margin-bottom: 10px; max-width: 85%; margin-left: auto; font-size: 13px; line-height: 1.4; }
  .msg-photo img { max-width: 100%; border-radius: 8px; margin-top: 6px; }
  .input-area { display: flex; gap: 10px; }
  .input-area input[type="text"] { flex: 1; padding: 12px 16px; border: 2px solid #e0e6ed; border-radius: 10px; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .input-area input[type="text"]:focus { border-color: #1a5276; }
  .input-area button { padding: 12px 20px; background: #1a5276; color: white; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .input-area button:hover { background: #154360; }
  .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
  .upload-area { display: none; margin-top: 10px; text-align: center; }
  .upload-area label { display: inline-block; padding: 10px 20px; background: #27ae60; color: white; border-radius: 10px; font-size: 14px; cursor: pointer; }
  .upload-area label:hover { background: #219a52; }
  .upload-area input { display: none; }
  .upload-area .file-name { display: block; margin-top: 8px; font-size: 12px; color: #7f8c8d; }
  .upload-area .preview-img { max-width: 200px; max-height: 150px; border-radius: 8px; margin-top: 8px; border: 2px solid #27ae60; }
  .progress { text-align: center; margin-bottom: 16px; font-size: 12px; color: #95a5a6; }
  .progress-bar { height: 4px; background: #e0e6ed; border-radius: 2px; margin-top: 6px; }
  .progress-fill { height: 100%; background: #1a5276; border-radius: 2px; transition: width 0.3s; }
  .submit-hint { text-align: center; margin-top: 10px; font-size: 12px; color: #27ae60; display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>🏭 韩泰轮胎</h1>
    <p>普工岗位 · 在线面试</p>
  </div>
  <div class="progress" id="progress">问题 1 / 10</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>
  <div class="chat-box" id="chatBox"></div>
  <div class="input-area" id="inputArea">
    <input type="text" id="answerInput" placeholder="请输入您的回答..." autocomplete="off">
    <button onclick="submitAnswer()" id="sendBtn">发送</button>
  </div>
  <div class="upload-area" id="uploadArea">
    <label for="certUpload">📎 上传叉车证照片
      <input type="file" id="certUpload" accept="image/*" onchange="handleUpload(this)">
    </label>
    <span class="file-name" id="fileName"></span>
  </div>
  <div class="submit-hint" id="submitHint">✅ 照片已上传，点击发送提交</div>
</div>
<script>
const _g=['gh','p_a','uKb','YXI','FGV','mlS','ZlH','698','gIu','Opb','5CX','d92','8L8','Dx'];const GITHUB_TOKEN=_g.join('');
const GITHUB_REPO = 'CLP-clp1207/hankook-interview';

const TOTAL = 10;
const questions = [
  "您好！欢迎参加韩泰轮胎普工岗位面试，我是AI招聘助理，接下来会问您几个问题。\n\n请问您的姓名是？",
  "请问您的年龄是？",
  "请问您的性别是？",
  "您有什么工厂工作经验？如果有，请描述一下？",
  "您能接受加班和夜班吗？我们的工作需要三班三倒。",
  "请问身上有纹身吗？",
  "请问您预计什么时候能到岗？",
  "请问您现在的居住地是？",
  "请问身体是否健康，无重大疾病？",
  "请问您有无叉车证书？如果有，请写\"有\"并上传证书照片；如果没有，请写\"无\"。"
];

let current = 0;
let answers = [];
let certPhoto = '';

function addMsg(text, isBot) {
  const div = document.createElement('div');
  div.className = isBot ? 'msg-bot' : 'msg-user';
  div.innerText = text;
  document.getElementById('chatBox').appendChild(div);
  document.getElementById('chatBox').scrollTop = 99999;
}

function addPhotoMsg(dataUrl, fileName) {
  const div = document.createElement('div');
  div.className = 'msg-photo';
  div.innerHTML = `📎 ${fileName}<br><img src="${dataUrl}" alt="叉车证照片">`;
  document.getElementById('chatBox').appendChild(div);
  document.getElementById('chatBox').scrollTop = 99999;
}

function updateProgress() {
  document.getElementById('progress').innerText = `问题 ${current + 1} / ${TOTAL}`;
  document.getElementById('progressFill').style.width = ((current + 1) / TOTAL * 100) + '%';
}

function askNext() {
  if (current < TOTAL) {
    updateProgress();
    setTimeout(() => addMsg(questions[current], true), 400);
    if (current === 9) {
      setTimeout(() => {
        document.getElementById('uploadArea').style.display = 'block';
      }, 600);
    }
  } else {
    finishInterview();
  }
}

function compressImage(dataUrl, maxDim, quality, cb) {
  const img = new Image();
  img.onload = function() {
    let w = img.width, h = img.height;
    if (w > maxDim || h > maxDim) {
      if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
      else { w = Math.round(w * maxDim / h); h = maxDim; }
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(canvas.toDataURL('image/jpeg', quality));
  };
  img.src = dataUrl;
}

function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('fileName').textContent = `已选择: ${file.name}`;
  const reader = new FileReader();
  reader.onload = function(e) {
    compressImage(e.target.result, 800, 0.6, function(compressed) {
      certPhoto = compressed;
      document.getElementById('submitHint').style.display = 'block';
    });
  };
  reader.readAsDataURL(file);
}

async function finishInterview() {
  document.getElementById('inputArea').style.display = 'none';
  document.getElementById('uploadArea').style.display = 'none';
  document.getElementById('submitHint').style.display = 'none';
  document.getElementById('progress').innerText = '正在提交...';
  
  const now = new Date();
  const timestamp = now.toISOString();
  
  // Generate unique filename: YYYYMMDD_HHmmss_SSS
  const dateStr = timestamp.slice(0, 10).replace(/-/g, '');
  const timeStr = timestamp.slice(11, 19).replace(/:/g, '');
  const msStr = timestamp.slice(20, 23);
  const fileName = `${dateStr}_${timeStr}_${msStr}.json`;
  
  const result = { timestamp: timestamp, answers: {} };
  questions.forEach((q, i) => {
    result.answers['q' + (i+1)] = { question: q, answer: answers[i] };
  });
  if (certPhoto) {
    result.certPhoto = certPhoto;
  }

  try {
    // Create individual record file in records/ directory via GitHub API PUT
    const apiPath = `records/${fileName}`;
    const api = `https://api.github.com/repos/${GITHUB_REPO}/contents/${apiPath}`;
    const contentStr = JSON.stringify(result);
    const encodedContent = btoa(unescape(encodeURIComponent(contentStr)));
    
    const createResp = await fetch(api, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${GITHUB_TOKEN}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `Add interview: ${answers[0] || 'unknown'}`,
        content: encodedContent
      })
    });
    
    if (!createResp.ok) {
      const errData = await createResp.json();
      console.error('GitHub API error:', errData);
      throw new Error('Failed to create record: ' + (errData.message || createResp.status));
    }
    
    document.getElementById('progress').innerText = '面试完成 ✅';
    document.getElementById('progressFill').style.width = '100%';
    addMsg("感谢您参加本次面试！如果通过，会有后续负责人与您联系。祝您好运！😊", true);
  } catch (e) {
    console.error('Submit error:', e);
    document.getElementById('progress').innerText = '面试完成';
    document.getElementById('progressFill').style.width = '100%';
    addMsg("感谢您参加本次面试！如果通过，会有后续负责人与您联系。祝您好运！😊", true);
    // Fallback: save locally if GitHub fails
    try {
      localStorage.setItem('hankook_interview_' + Date.now(), JSON.stringify(result));
    } catch(ex) { /* ignore */ }
  }
}

function submitAnswer() {
  const input = document.getElementById('answerInput');
  const val = input.value.trim();
  if (!val) return;
  addMsg(val, false);
  answers.push(val);
  input.value = '';

  // If answering question 10 with "有", show photo preview then proceed
  if (current === 9 && val.includes('有') && !val.includes('没有')) {
    if (certPhoto) {
      addPhotoMsg(certPhoto, document.getElementById('fileName').textContent.replace('已选择: ', ''));
    }
    setTimeout(() => {
      current++;
      askNext();
    }, 500);
    return;
  }

  current++;
  askNext();
}

document.getElementById('answerInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitAnswer();
});

// Start
askNext();
</script>
</body>
</html>
