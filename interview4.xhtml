function addMsg(text,isBot){
  var div=document.createElement('div');

  div.innerText=text;
  document.getElementById('chatBox').appendChild(div);
  document.getElementById('chatBox').scrollTop=99999;
}

function addPhotoMsg(dataUrl,fileName){

function updateProgress(){
  document.getElementById('progress').innerText='й—®йўҳ '+(current+1)+' / '+TOTAL;
  document.getElementById('progressFill').style.width=((current+1)/TOTAL*100)+'%';

function hideAllInputs(){
  document.getElementById('inputArea').style.display='none';
  document.getElementById('choiceArea').style.display='none';
  document.getElementById('selectArea').style.display='none';
  document.getElementById('uploadArea').style.display='none';
}

function askNext(){
  if(current<TOTAL){
    updateProgress();
    var q=questions[current];
    setTimeout(function(){
      addMsg(q.text,true);
      hideAllInputs();
      if(q.type==='text'){
        document.getElementById('inputArea').style.display='flex';
        document.getElementById('answerInput').value='';
        document.getElementById('answerInput').focus();
      }else if(q.type==='choice'){
        document.getElementById('choiceArea').style.display='block';
        renderChoices(q.options);
      }else if(q.type==='heightweight'){
        document.getElementById('selectArea').style.display='block';
        renderHeightWeight();
      }else if(q.type==='province'){
        document.getElementById('selectArea').style.display='block';
        renderProvince();
      }else if(q.type==='forklift'){
        document.getElementById('choiceArea').style.display='block';
        renderForklift();
      }
    },400);
  }else{
    finishInterview();
  }

function renderChoices(options){
  var area=document.getElementById('choiceArea');
  area.innerHTML='';
  options.forEach(function(opt){

    btn.className='choice-btn';
    btn.textContent=opt;
    btn.onclick=function(){submitChoice(opt);};
    area.appendChild(btn);
  });
}

function compressImage(dataUrl,maxDim,quality,cb){
  var img=new Image();
  img.onload=function(){
    var w=img.width,h=img.height;
    if(w>maxDim||h>maxDim){
      if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}
      else{w=Math.round(w*maxDim/h);h=maxDim;}
    }
    var canvas=document.createElement('canvas');
    canvas.width=w;canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    cb(canvas.toDataURL('image/jpeg',quality));
  };
  img.src=dataUrl;
}

function handleUpload(input){
  var file=input.files[0];
  if(!file)return;
  document.getElementById('fileName').textContent='е·ІйҖүжӢ©: '+file.name;
  var reader=new FileReader();
  reader.onload=function(e){
    compressImage(e.target.result,800,0.6,function(compressed){
      certPhoto=compressed;
      document.getElementById('previewImg').src=compressed;
      document.getElementById('uploadPreview').style.display='block';
    });
  };
  reader.readAsDataURL(file);
}

  blobHtml+='var DATA='+dataStr+';\n';

  blobHtml+='' +
'var contentStr=JSON.stringify(DATA);\n'+
'var encodedContent=btoa(unescape(encodeURIComponent(contentStr)));\n'+
'var body=JSON.stringify({message:"Add interview: "+SUBMITNAME,content:encodedContent});\n'+
'var urls=[\n'+
'  "https://api.github.com/repos/"+REPO+"/contents/records/"+FNAME,\n'+
'  "https://gh-proxy.com/api.github.com/repos/"+REPO+"/contents/records/"+FNAME+"?access_token="+TOKEN,\n'+
'  "https://ghproxy.net/api.github.com/repos/"+REPO+"/contents/records/"+FNAME+"?access_token="+TOKEN\n'+
'];\n'+
'var idx=0;\n'+
'function tryNext(){\n'+
'  if(idx>=urls.length){onFail();return;}\n'+
'  var url=urls[idx];idx++;\n'+
'  var headers={"Accept":"application/vnd.github.v3+json","Content-Type":"application/json"};\n'+
'  if(url.indexOf("access_token=")<0){headers["Authorization"]="token "+TOKEN;}\n'+
'  fetch(url,{method:"PUT",headers:headers,body:body}).then(function(r){\n'+
'    if(r.ok){r.json().then(function(){onSuccess();});}\n'+
'    else{r.text().then(function(t){console.log("FAIL["+idx+"]: "+r.status+" "+t);tryNext();});}\n'+
'  }).catch(function(e){console.log("ERR["+idx+"]: "+e);tryNext();});\n'+
'}\n'+
'function onSuccess(){\n'+
'  document.getElementById("sp").style.display="none";\n'+
'  document.getElementById("sp").outerHTML="<div class=\\"ok\\">\\u2705</div>";\n'+
'  document.getElementById("title").innerText="йқўиҜ•е®ҢжҲҗпјҒ";\n'+
'  document.getElementById("sub").innerText="ж„ҹи°ўжӮЁеҸӮеҠ жң¬ж¬ЎйқўиҜ•пјҒ\\nеҰӮжһңйҖҡиҝҮпјҢдјҡжңүеҗҺз»ӯиҙҹиҙЈдәәдёҺжӮЁиҒ”зі»гҖӮ\\nзҘқжӮЁеҘҪиҝҗпјҒ";\n'+
'}\n'+
'function onFail(){\n'+
'  try{localStorage.setItem("hankook_"+Date.now(),contentStr);}catch(e){}\n'+
'  document.getElementById("sp").style.display="none";\n'+
'  document.getElementById("sp").outerHTML="<div class=\\"ok\\">\\u2705</div>";\n'+
'  document.getElementById("title").innerText="йқўиҜ•е®ҢжҲҗпјҒ";\n'+
'  document.getElementById("sub").innerText="ж„ҹи°ўжӮЁеҸӮеҠ жң¬ж¬ЎйқўиҜ•пјҒ\\nеҰӮжһңйҖҡиҝҮпјҢдјҡжңүеҗҺз»ӯиҙҹиҙЈдәәдёҺжӮЁиҒ”зі»гҖӮ\\nзҘқжӮЁеҘҪиҝҗпјҒ";\n'+
